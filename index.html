<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<title>Quiz</title>

<style>
:root {
  color-scheme: light;
}

body {
  margin: 0;
  padding: 20px;
  background-color: #03FF98;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
}

#container {
  width: 100%;
  max-width: 900px;
}

#question {
  text-align: center;
  font-size: clamp(20px, 4vw, 40px);
  margin-bottom: 30px;
  word-wrap: break-word;
}

.answer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin: 10px 0;
  font-size: clamp(16px, 3vw, 28px);
}

.answer-text {
  flex-grow: 1;
  text-align: left;
}

.answer-right {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-left: 15px;
}

.result {
  font-weight: bold;
}

.correct { color: green; }
.wrong { color: red; }

button {
  margin-top: 30px;
  width: 100%;
  font-size: clamp(18px, 3vw, 30px);
  padding: 12px;
  cursor: pointer;
}

#score {
  margin-top: 20px;
  text-align: center;
  font-size: clamp(20px, 4vw, 36px);
}
</style>
</head>

<body>
<div id="container">

<h2 id="question"></h2>
<div id="answers"></div>
<button id="actionBtn">OK</button>
<div id="score"></div>

</div>

<script>
let allQuestions = [];
let quiz = [];
let current = 0;
let correctCount = 0;
let answered = false;

fetch('data.json')
  .then(r => r.json())
  .then(data => {
    allQuestions = data;
    startQuiz();
  });

function startQuiz() {
  quiz = shuffle(allQuestions).slice(0, 20);
  current = 0;
  correctCount = 0;
  loadQuestion();
}

function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

function loadQuestion() {
  answered = false;
  document.getElementById('actionBtn').textContent = "OK";
  document.getElementById('score').textContent = "";

  const q = quiz[current];
  document.getElementById('question').textContent = q.question;

  const answersDiv = document.getElementById('answers');
  answersDiv.innerHTML = "";

  ['a','b','c','d'].forEach((label, i) => {
    const div = document.createElement('div');
    div.className = "answer";

    div.innerHTML = `
      <div class="answer-text">(${label}) ${q.answers[i]}</div>
      <div class="answer-right">
        <input type="radio" name="answer" value="${i+1}">
        <span class="result" id="res${i}"></span>
      </div>
    `;
    answersDiv.appendChild(div);
  });
}

document.getElementById('actionBtn').onclick = () => {
  if (!answered) {
    const selected = document.querySelector('input[name="answer"]:checked');
    if (!selected) return;

    const answer = parseInt(selected.value);
    const q = quiz[current];

    if (answer === q.correct) {
      correctCount++;
      document.getElementById(`res${answer-1}`).textContent = "TRUE";
      document.getElementById(`res${answer-1}`).className = "result correct";
    } else {
      document.getElementById(`res${q.correct-1}`).textContent = "TRUE";
      document.getElementById(`res${q.correct-1}`).className = "result correct";

      document.getElementById(`res${answer-1}`).textContent = "FALSE";
      document.getElementById(`res${answer-1}`).className = "result wrong";
    }

    answered = true;
    document.getElementById('actionBtn').textContent = "Next";

  } else {
    current++;

    if (current >= quiz.length) {
      document.getElementById('question').textContent = "Finished!";
      document.getElementById('answers').innerHTML = "";
      document.getElementById('actionBtn').style.display = "none";
      document.getElementById('score').textContent =
        `${correctCount} / ${quiz.length}`;
      return;
    }

    loadQuestion();
  }
};
</script>

</body>
</html>
